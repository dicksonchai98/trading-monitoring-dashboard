name: ci-fast

on:
  pull_request:
    branches:
      - master

# Fast CI for PRs to master only:
# - Backend: ruff + pytest (no deploy)
# - Frontend: npm build

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend dependencies
        run: python -m pip install -r apps/backend/requirements.txt
      - name: Ruff lint
        run: python -m ruff check apps/backend
      - name: Ruff format check
        run: python -m ruff format --check apps/backend
      - name: Pytest
        run: python -m pytest apps/backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm install
      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build
