name: Backend Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "apps/backend/**"
      - "docker-compose.ec2.yml"
      - "infra/nginx.ec2.conf"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/trading-monitoring-dashboard
            git stash push -u -m "ci-auto-stash-$(date +%Y%m%d-%H%M%S)" || true
            git pull origin master
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.ec2.yml up -d postgres redis
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.ec2.yml run --rm backend-api alembic -c alembic.ini upgrade head
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.ec2.yml up -d backend-api nginx
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.ec2.yml --profile full up -d backend-stream-worker backend-email-worker
