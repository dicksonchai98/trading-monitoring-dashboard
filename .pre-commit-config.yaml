repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/backend/.*\.py$
      - id: ruff-format
        files: ^apps/backend/.*\.py$

  - repo: local
    hooks:
      - id: forbid-pen-files
        name: Forbid .pen files
        language: fail
        entry: ".pen files must not be committed. Please unstage and remove them."
        files: \.pen$
