services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db;Database=SocialMediaDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_keys:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 20

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - ./SocialMediaApp.Web/DB:/db:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "Your_password123" -d SocialMediaDb -i /db/stored-procedures.sql
    restart: "no"

volumes:
  db_data:
  app_keys:

