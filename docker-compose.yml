services:
  backend-api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./.env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-xxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-xxx}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-xxx}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3000/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3000/cancel}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-http://localhost:3000/success}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:981025060598Cc!@host.docker.internal:5432/trading_dashboard}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      AGGREGATOR_ENABLED: "false"

  backend-stream-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: python -m workers.stream_processing_worker
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:981025060598Cc!@host.docker.internal:5432/trading_dashboard}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}

  backend-tick-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: python -m workers.stream_processing_tick_worker
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:981025060598Cc!@host.docker.internal:5432/trading_dashboard}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}

  backend-bidask-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: python -m workers.stream_processing_bidask_worker
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:981025060598Cc!@host.docker.internal:5432/trading_dashboard}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}

  backend-latest-state-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: python -m workers.latest_state_worker
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:981025060598Cc!@host.docker.internal:5432/trading_dashboard}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}

  backend-email-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: python -m workers.email_pipeline_worker
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:981025060598Cc!@host.docker.internal:5432/trading_dashboard}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}

  backend-kbar-analytics-cron-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: python -m workers.kbar_analytics_cron_worker
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      KBAR_ANALYTICS_CRON_ENABLED: ${KBAR_ANALYTICS_CRON_ENABLED:-1}
      KBAR_ANALYTICS_CRON_INTERVAL_SECONDS: ${KBAR_ANALYTICS_CRON_INTERVAL_SECONDS:-86400}
      KBAR_ANALYTICS_CRON_WINDOW_DAYS: ${KBAR_ANALYTICS_CRON_WINDOW_DAYS:-30}
      KBAR_ANALYTICS_CRON_CODE: ${KBAR_ANALYTICS_CRON_CODE:-TXF}

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    profiles:
      - build

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  redis_data:
