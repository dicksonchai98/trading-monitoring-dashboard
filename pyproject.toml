[tool.ruff]
line-length = 100
src = ["apps/backend/app", "apps/backend/tests", "apps/backend/scripts"]
extend-exclude = ["apps/backend/alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4", "A", "S"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"apps/backend/tests/**/*.py" = ["S101"]
"apps/backend/scripts/**/*.py" = ["S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
