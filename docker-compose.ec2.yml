services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend-web
      - backend-api
    restart: unless-stopped
    ports:
      - "80:80"
    command: >
      /bin/sh -c "cat > /etc/nginx/conf.d/default.conf <<'EOF'
      server {
        listen 80;
        server_name market-micro.com www.market-micro.com;
        client_max_body_size 20m;

        location / {
          proxy_pass http://frontend-web:4173;
          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location /realtime/ {
          proxy_pass http://backend-api:8000/realtime/;
          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_set_header Connection '';
          proxy_buffering off;
          proxy_cache off;
          proxy_read_timeout 3600s;
        }

        location ~ ^/(auth|billing|email|analytics|admin|api)/ {
          proxy_pass http://backend-api:8000;
          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }

        location = /metrics {
          return 403;
        }
      }
      EOF
      nginx -g 'daemon off;'"
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  frontend-web:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env.production
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    command: >
      /bin/sh -c "VITE_API_BASE_URL=$${VITE_API_BASE_URL}
      npm run build &&
      npm run preview -- --host 0.0.0.0 --port 4173"
    expose:
      - "4173"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports: []
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trading_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend-api:
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports: []
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_dashboard}
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend-stream-worker:
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_dashboard}
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend-email-worker:
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_dashboard}
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    ports: []
    expose:
      - "6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  redisinsight:
    profiles:
      - debug

  pgadmin:
    image: dpage/pgadmin4:8
    env_file:
      - ./.env.production
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@market-micro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "20"
      PGADMIN_CONFIG_LOGIN_BANNER: "'Authorized access only.'"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5050:80"
    restart: unless-stopped
    profiles:
      - debug
    logging:
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
