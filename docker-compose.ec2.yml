services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend-api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.ec2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports: []
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trading_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend-api:
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports: []
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_dashboard}
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  frontend-web:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env.production
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    command:
      - sh
      - -c
      - VITE_API_BASE_URL="$VITE_API_BASE_URL" npm run build && npm run preview -- --host 0.0.0.0 --port 4173
    expose:
      - "4173"
    restart: unless-stopped
    profiles:
      - full
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend-stream-worker:
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_dashboard}
    restart: unless-stopped
    profiles:
      - full
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  backend-email-worker:
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_dashboard}
    restart: unless-stopped
    profiles:
      - full
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    ports: []
    expose:
      - "6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  redisinsight:
    profiles:
      - debug

  pgadmin:
    image: dpage/pgadmin4:8
    env_file:
      - ./.env.production
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@market-micro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "20"
      PGADMIN_CONFIG_LOGIN_BANNER: "'Authorized access only.'"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5050:80"
    restart: unless-stopped
    profiles:
      - debug
    logging:
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
